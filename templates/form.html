{% extends 'base.html' %}
{% block title %}New Quiz – MindMap{% endblock %}
{% block body %}
<div style="padding:60px 20px;background:linear-gradient(160deg,#f8f4ff,#fff);">
  <div style="max-width:560px;margin:0 auto;text-align:center;">
    <h2 class="fw-bold mb-2" style="color:var(--ink);">Tailor your quiz</h2>
    <p class="text-muted mb-4">Tell our AI what you know and what you want to master.</p>

    <div class="card-mm p-4 text-start">
      <form action="/quiz" method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:13px;text-transform:uppercase;color:#888;">Subject</label>
          <input type="text" name="subject" class="form-control" placeholder="e.g. Machine Learning, Calculus, History" required
                 style="border-radius:10px;padding:12px;border-color:var(--border);">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:13px;text-transform:uppercase;color:#888;">Topics Already Mastered</label>
          <textarea name="mastered" class="form-control" rows="2" placeholder="e.g. Linear Regression, Python basics..."
                    style="border-radius:10px;padding:12px;border-color:var(--border);resize:none;"></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold" style="font-size:13px;text-transform:uppercase;color:#888;">Focus Topic for Today</label>
          <input type="text" name="focus" class="form-control" placeholder="e.g. Neural Networks, Recursion..."
                 style="border-radius:10px;padding:12px;border-color:var(--border);">
        </div>
        <button type="submit" class="btn btn-purple w-100" style="padding:13px;font-size:15px;border-radius:12px;">
          Generate Quiz 🔥
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
